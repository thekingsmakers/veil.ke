<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 – Page Not Found | Veil.ke</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root { --secondary: #8C6A4A; --bg: #FAF8F5; --text: #1A1A1A; --text-light: #6B6B6B; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .container { max-width: 500px; }
    h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 6rem; font-weight: 600; color: var(--secondary); line-height: 1; margin-bottom: 16px; }
    h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
    p { color: var(--text-light); margin-bottom: 32px; line-height: 1.7; }
    a { display: inline-block; padding: 14px 32px; background: var(--text); color: var(--bg); text-decoration: none; border-radius: 50px; font-size: 0.85rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; }
    a:hover { background: var(--secondary); }
</style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved. Let us guide you back to elegance.</p>
        <a href="index.html">Return Home</a>
    </div>
</body>
</html>
